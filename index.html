<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a0a2e">
<title>Rami — Compteur de Scores</title>
<style>
  :root {
    --bg: #1a0a2e;
    --bg-deeper: #0f0620;
    --surface: #2d1555;
    --surface-2: #3a1d6b;
    --surface-3: #4a2685;
    --line: #5a3496;
    --line-soft: #3a1d6b;
    --gold: #c9a227;
    --gold-soft: #e6c66b;
    --gold-deep: #8a6e15;
    --gold-glow: rgba(201,162,39,0.35);
    --red: #e84545;
    --blue-gray: #7888a8;
    --blue-gray-2: #9aacc8;
    --green: #4ade80;
    --orange: #fb923c;
    --text: #f4ecd8;
    --text-dim: #c5b4e0;
    --text-muted: #8a76b8;
    --serif: "Cormorant Garamond","Cormorant",Georgia,"Times New Roman",serif;
    --display: "Playfair Display","Cormorant Garamond",Georgia,serif;
    --safe-top: env(safe-area-inset-top,0px);
    --safe-bottom: env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(ellipse 90% 60% at 50% -10%,rgba(90,52,150,.55),transparent 65%),
      radial-gradient(ellipse 70% 50% at 50% 110%,rgba(201,162,39,.08),transparent 70%),
      var(--bg);
    background-attachment:fixed;
    color:var(--text);
    font-family:var(--serif);
    font-size:17px;
    line-height:1.4;
    min-height:100dvh;
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
  }
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  input{font:inherit;color:inherit}
  input[type="text"],input[type="number"]{
    background:rgba(15,6,32,.6);
    border:1px solid var(--line-soft);
    border-radius:10px;
    padding:12px 14px;
    color:var(--text);
    width:100%;
    font-family:var(--serif);
    font-size:18px;
    outline:none;
    transition:border-color .2s,box-shadow .2s;
  }
  input[type="text"]:focus,input[type="number"]:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
  input[type="number"]{-moz-appearance:textfield}
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

  .app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}
  .header{
    padding:calc(20px + var(--safe-top)) 24px 14px;
    text-align:center;
    border-bottom:1px solid var(--line-soft);
    position:relative;
  }
  .header::after{
    content:"";position:absolute;left:50%;bottom:-1px;
    width:80px;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    transform:translateX(-50%);
  }
  .brand{font-family:var(--display);font-weight:600;font-size:32px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;text-shadow:0 1px 0 #000,0 0 24px var(--gold-glow)}
  .brand-sub{font-style:italic;color:var(--text-muted);font-size:13px;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}
  .content{flex:1;padding:20px 18px 120px;overflow-y:auto}
  .content.no-tabs{padding-bottom:calc(40px + var(--safe-bottom))}

  /* Panels */
  .panel{
    background:linear-gradient(180deg,var(--surface) 0%,#25104a 100%);
    border:1px solid var(--line-soft);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
    box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);
  }
  .panel-gold{
    border-color:var(--gold-deep);
    box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06),0 0 0 1px rgba(201,162,39,.15);
  }
  .panel-title{
    font-family:var(--display);font-size:13px;text-transform:uppercase;letter-spacing:.22em;
    color:var(--gold-soft);margin-bottom:12px;display:flex;align-items:center;gap:10px;
  }
  .panel-title::before,.panel-title::after{content:"";height:1px;background:linear-gradient(90deg,transparent,var(--gold-deep),transparent);flex:1}

  /* Avatar */
  .avatar{
    border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;flex:0 0 auto;
    border:2px solid rgba(255,255,255,.15);
    box-shadow:0 2px 8px rgba(0,0,0,.4);
    text-transform:uppercase;letter-spacing:.04em;
  }
  .av-lg{width:40px;height:40px;font-size:14px}
  .av-md{width:34px;height:34px;font-size:12px}
  .av-sm{width:28px;height:28px;font-size:10px}

  /* Buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 22px;border-radius:12px;
    font-family:var(--display);font-size:15px;letter-spacing:.16em;text-transform:uppercase;font-weight:500;
    transition:transform .1s,box-shadow .2s,background .2s;border:1px solid transparent;user-select:none;
  }
  .btn-primary{
    background:linear-gradient(180deg,var(--gold-soft) 0%,var(--gold) 60%,var(--gold-deep) 100%);
    color:#1a0a2e;box-shadow:0 4px 14px rgba(201,162,39,.3),inset 0 1px 0 rgba(255,255,255,.4);font-weight:600;
  }
  .btn-primary:active{transform:translateY(1px)}
  .btn-primary:disabled{background:linear-gradient(180deg,#4a3a1a,#2a1f0e);color:var(--text-muted);box-shadow:none;cursor:not-allowed}
  .btn-ghost{background:rgba(58,29,107,.5);color:var(--text-dim);border:1px solid var(--line-soft)}
  .btn-ghost:active{background:rgba(74,38,133,.6)}
  .btn-block{display:flex;width:100%}

  /* Setup */
  .setup-hero{text-align:center;padding:30px 0 20px}
  .setup-hero .ornament{font-size:28px;color:var(--gold);letter-spacing:.4em;margin-bottom:18px}
  .setup-hero h1{font-family:var(--display);font-size:28px;font-weight:500;color:var(--text);margin-bottom:6px}
  .setup-hero p{font-style:italic;color:var(--text-muted);font-size:15px}
  .player-count{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .count-pill{
    padding:18px 0;border-radius:14px;background:rgba(45,21,85,.6);
    border:1px solid var(--line-soft);font-family:var(--display);text-align:center;transition:all .2s;
  }
  .count-pill .num{font-size:30px;color:var(--gold-soft);display:block;line-height:1}
  .count-pill .lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.18em;margin-top:6px}
  .count-pill.active{background:linear-gradient(180deg,var(--surface-3),var(--surface));border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-glow),0 4px 20px rgba(201,162,39,.2)}
  .count-pill.active .num{color:var(--gold)}
  .name-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .name-row .seat{
    width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex:0 0 38px;
    font-family:var(--display);font-size:16px;font-weight:600;
  }
  .name-select-wrap{position:relative;width:100%}
  .name-select-wrap::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gold);pointer-events:none;font-size:16px}
  select{
    appearance:none;-webkit-appearance:none;
    background:rgba(15,6,32,.6);border:1px solid var(--line-soft);border-radius:10px;
    padding:12px 36px 12px 14px;color:var(--text);width:100%;
    font-family:var(--serif);font-size:18px;outline:none;cursor:pointer;
    transition:border-color .2s,box-shadow .2s;
  }
  select:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
  select option{background:#1a0a2e;color:var(--text)}
  .autre-row{display:flex;gap:8px;margin-top:8px;align-items:center}
  .autre-row input{flex:1;padding:10px 14px;font-size:17px}
  .btn-save{
    flex:0 0 auto;padding:10px 16px;border-radius:10px;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold-deep));
    color:#1a0a2e;font-family:var(--display);font-size:13px;letter-spacing:.12em;
    text-transform:uppercase;font-weight:700;white-space:nowrap;
    box-shadow:0 2px 8px rgba(201,162,39,.3);
  }

  /* Card face */
  .card-face{
    width:78px;height:110px;border-radius:8px;
    background:linear-gradient(160deg,#fdf6e3 0%,#f0e3c0 100%);
    color:#2a1810;position:relative;
    box-shadow:0 4px 16px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.6),inset 0 0 0 2px rgba(0,0,0,.1);
    font-family:var(--display);flex:0 0 auto;user-select:none;
  }
  .card-face.red{color:var(--red)}
  .card-face.black{color:#1c2540}
  .card-face.flip{
    background:linear-gradient(135deg,#4a2685,#2d1555);color:var(--gold);
    box-shadow:0 4px 16px rgba(0,0,0,.5),inset 0 0 0 2px var(--gold-deep);
    display:flex;align-items:center;justify-content:center;font-size:40px;
  }
  .card-face .corner{position:absolute;font-size:18px;line-height:1;font-weight:600;text-align:center}
  .card-face .corner.tl{top:8px;left:8px}
  .card-face .corner.br{bottom:8px;right:8px;transform:rotate(180deg)}
  .card-face .corner .v{display:block}
  .card-face .corner .s{font-size:14px;display:block;margin-top:1px}
  .card-face .center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:38px}
  .card-face.small{width:56px;height:80px}
  .card-face.small .corner{font-size:13px}
  .card-face.small .corner .s{font-size:11px}
  .card-face.small .center{font-size:26px}

  /* Joker stage */
  .joker-stage{display:flex;align-items:center;justify-content:center;gap:18px;padding:12px 0 18px;flex-wrap:wrap}
  .joker-arrow{color:var(--gold);font-size:22px;opacity:.7}
  .joker-label{text-align:center;margin-top:8px;font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--text-muted)}
  .joker-label.is-gold{color:var(--gold-soft)}
  .joker-result{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;max-width:160px}
  .joker-result.small{max-width:none}
  .joker-sep{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted)}
  .rank-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
  .rank-btn{
    aspect-ratio:1;border-radius:8px;background:rgba(15,6,32,.55);border:1px solid var(--line-soft);
    font-family:var(--display);font-size:18px;color:var(--text-dim);transition:all .15s;
  }
  .rank-btn:active{transform:scale(.94)}
  .rank-btn.active{background:linear-gradient(180deg,var(--gold-soft),var(--gold-deep));color:#1a0a2e;border-color:var(--gold);font-weight:600}
  .suit-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .suit-btn{padding:14px 0;border-radius:10px;background:rgba(15,6,32,.55);border:1px solid var(--line-soft);font-size:26px;transition:all .15s}
  .suit-btn.red{color:var(--red)}
  .suit-btn.black{color:var(--blue-gray-2)}
  .suit-btn.active.red{background:rgba(232,69,69,.15);border-color:var(--red);box-shadow:0 0 0 1px rgba(232,69,69,.3)}
  .suit-btn.active.black{background:rgba(120,136,168,.15);border-color:var(--blue-gray-2);box-shadow:0 0 0 1px rgba(154,172,200,.3)}

  /* Switch */
  .switch-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .switch-row:last-child{border-bottom:none}
  .switch-row .lbl{font-size:16px;color:var(--text)}
  .switch-row .lbl em{display:block;font-style:italic;color:var(--text-muted);font-size:13px;margin-top:2px}
  .switch{flex:0 0 52px;width:52px;height:30px;background:rgba(15,6,32,.6);border:1px solid var(--line-soft);border-radius:999px;position:relative;transition:all .2s}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;background:var(--text-muted);border-radius:50%;transition:all .2s}
  .switch.on{background:linear-gradient(180deg,var(--gold),var(--gold-deep));border-color:var(--gold)}
  .switch.on::after{left:25px;background:#fdf6e3}

  /* Player entry */
  .player-entry{border:1px solid var(--line-soft);border-radius:14px;padding:14px;margin-bottom:10px;background:rgba(15,6,32,.35);transition:all .2s}
  .player-entry.is-winner{border-color:var(--gold);background:linear-gradient(180deg,rgba(201,162,39,.12),rgba(15,6,32,.4));box-shadow:0 0 0 1px var(--gold-glow)}
  .player-entry.is-parole{border-color:var(--blue-gray);background:rgba(120,136,168,.06)}
  .player-entry-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .player-name{font-family:var(--display);font-size:19px;color:var(--text);display:flex;align-items:center;gap:8px}
  .winner-pick{
    width:30px;height:30px;border-radius:50%;border:2px solid var(--line);
    background:rgba(15,6,32,.6);display:flex;align-items:center;justify-content:center;
    color:var(--gold);font-size:14px;flex:0 0 30px;transition:all .2s;
  }
  .winner-pick.on{background:linear-gradient(180deg,var(--gold-soft),var(--gold-deep));border-color:var(--gold);color:#1a0a2e;box-shadow:0 0 12px var(--gold-glow)}
  .player-entry .row{display:flex;gap:10px;align-items:center}
  .malus-input{flex:1}
  .malus-input input{padding:10px 12px;font-size:17px}
  .penalty-toggle{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .chip{
    padding:8px 12px;border-radius:999px;background:rgba(15,6,32,.55);border:1px solid var(--line-soft);
    font-size:13px;color:var(--text-muted);display:inline-flex;align-items:center;gap:6px;transition:all .15s;
  }
  .chip.on{background:rgba(232,69,69,.15);border-color:var(--red);color:var(--red)}
  .chip .plus{font-family:var(--display);font-weight:600}
  .chip-parole.on{background:rgba(120,136,168,.18);border-color:var(--blue-gray-2);color:var(--blue-gray-2)}

  /* Score cards */
  .score-card{
    background:linear-gradient(180deg,var(--surface) 0%,#25104a 100%);
    border:1px solid var(--line-soft);border-radius:14px;padding:14px 16px;margin-bottom:12px;
    position:relative;overflow:hidden;transition:opacity .3s;
  }
  .score-card.dealer{border-color:var(--gold-deep);box-shadow:0 0 0 1px rgba(201,162,39,.18)}
  .score-card.eliminated{opacity:.55;background:linear-gradient(180deg,rgba(45,21,85,.5) 0%,rgba(15,6,32,.5) 100%)}
  .score-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .score-name{display:flex;align-items:center;gap:10px;font-family:var(--display);font-size:20px;color:var(--text)}
  .score-pts{font-family:var(--display);font-size:26px;font-weight:600;color:var(--gold-soft);letter-spacing:.04em;font-variant-numeric:tabular-nums}
  .score-pts.danger{color:var(--red)}
  .score-pts.warn{color:var(--orange)}
  .score-pts.safe{color:var(--green)}
  .progress{height:7px;background:rgba(15,6,32,.7);border-radius:999px;overflow:hidden;border:1px solid var(--line-soft)}
  .progress-bar{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .score-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-top:8px;text-transform:uppercase;letter-spacing:.12em}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-family:var(--display);text-transform:uppercase;letter-spacing:.14em;font-weight:600}
  .badge-dealer{background:linear-gradient(180deg,var(--gold-soft),var(--gold-deep));color:#1a0a2e;box-shadow:0 0 12px var(--gold-glow);animation:dealerPulse 2.4s ease-in-out infinite}
  .badge-out{background:rgba(232,69,69,.18);color:var(--red);border:1px solid rgba(232,69,69,.4)}
  @keyframes dealerPulse{0%,100%{box-shadow:0 0 8px var(--gold-glow)}50%{box-shadow:0 0 18px var(--gold-glow),0 0 28px var(--gold-glow)}}

  /* History */
  .round-card{background:linear-gradient(180deg,var(--surface) 0%,#25104a 100%);border:1px solid var(--line-soft);border-radius:14px;padding:14px 16px;margin-bottom:12px}
  .round-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px dashed var(--line-soft)}
  .round-num{font-family:var(--display);font-size:13px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.2em}
  .round-dealer{font-style:italic;font-size:13px;color:var(--text-muted)}
  .round-joker{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 0}
  .round-joker .mini-tag{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.15em;margin-right:4px}
  .round-line{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:15px;gap:8px}
  .round-line .nm{color:var(--text-dim);display:flex;align-items:center;gap:6px;flex:1}
  .round-line .nm.win{color:var(--gold-soft);font-weight:600}
  .round-line .tags{color:var(--red);font-size:12px;font-style:italic}
  .round-line .pt{font-family:var(--display);font-variant-numeric:tabular-nums;flex:0 0 auto}
  .round-parole{text-align:center;font-style:italic;color:var(--blue-gray-2);padding:6px 0;font-size:14px}
  .empty-history{text-align:center;padding:50px 20px;color:var(--text-muted);font-style:italic}
  .empty-history .ornament{font-size:30px;color:var(--gold-deep);margin-bottom:12px}

  /* Tabs */
  .tabs{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
    background:linear-gradient(180deg,rgba(26,10,46,.85) 0%,var(--bg-deeper) 100%);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line-soft);padding-bottom:var(--safe-bottom);z-index:50;
  }
  .tabs::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:100px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .tabs-inner{display:grid;grid-template-columns:repeat(5,1fr)}
  .tab{padding:12px 0 14px;text-align:center;color:var(--text-muted);transition:color .2s;position:relative}
  .tab .ico{display:block;font-size:22px;margin-bottom:4px;line-height:1}
  .tab .lbl{font-family:var(--display);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
  .tab.active{color:var(--gold-soft)}
  .tab.active .ico{color:var(--gold)}
  .tab.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:var(--gold);border-radius:2px}

  /* Tableau */
  .tableau-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .stbl{width:100%;border-collapse:separate;border-spacing:0;font-family:var(--display)}
  .stbl th{
    background:var(--surface);padding:8px 4px 6px;font-size:9px;text-transform:uppercase;
    letter-spacing:.12em;color:var(--gold-soft);text-align:center;
    border-bottom:2px solid var(--gold-deep);position:sticky;top:0;z-index:2;
  }
  .stbl td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--line-soft);vertical-align:middle;min-width:76px}
  .stbl .row-current td{background:rgba(201,162,39,.05)}
  .stbl .row-total td{background:var(--surface);border-top:2px solid var(--gold-deep);font-size:18px;font-weight:700;padding:10px 4px}
  .ci{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:44px;gap:2px;border-radius:6px}
  .ci-total{font-size:20px;font-variant-numeric:tabular-nums;font-weight:700}
  .ci-delta{font-size:11px;color:var(--text-muted);font-weight:400}
  .ci-win .ci-total{color:var(--gold-soft)}
  .ci-win .ci-delta{color:var(--gold-deep)}
  .ci-pen .ci-total{color:var(--red)}
  .ci-out{color:var(--red);font-size:10px;font-style:italic}
  .ci-tap{cursor:pointer;transition:background .12s}
  .ci-tap:active .ci{background:rgba(201,162,39,.12)}
  .ci-empty{color:var(--text-muted);font-size:22px;line-height:1}
  .ichips{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;margin-top:2px}
  .ic{font-size:8px;padding:1px 3px;border-radius:3px;font-family:var(--display);font-weight:700;letter-spacing:.04em}
  .ic-d{background:rgba(201,162,39,.25);color:var(--gold)}
  .ic-e{background:rgba(74,222,128,.2);color:var(--green)}
  .ic-51{background:rgba(232,69,69,.22);color:var(--red)}
  .ic-par{background:rgba(120,136,168,.2);color:var(--blue-gray-2)}

<body>
<div class="app" id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://rgorwgxvfyugizxnzadc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_XgaPf4tGVuc4wH7bVjZXsA_FB5y7-8c';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SUITS=[
  {id:'H',glyph:'♥',label:'Cœur',   color:'red'},
  {id:'D',glyph:'♦',label:'Carreau',color:'red'},
  {id:'S',glyph:'♠',label:'Pique',  color:'black'},
  {id:'C',glyph:'♣',label:'Trèfle', color:'black'},
];
const RANKS=[
  {id:'A', label:'A', pts:10},{id:'2', label:'2', pts:2},{id:'3', label:'3', pts:3},
  {id:'4', label:'4', pts:4},{id:'5', label:'5', pts:5},{id:'6', label:'6', pts:6},
  {id:'7', label:'7', pts:7},{id:'8', label:'8', pts:8},{id:'9', label:'9', pts:9},
  {id:'10',label:'10',pts:10},{id:'V',label:'V', pts:10},{id:'D',label:'D', pts:10},
  {id:'R', label:'R', pts:10},
];
const SUIT_BY_ID=Object.fromEntries(SUITS.map(s=>[s.id,s]));
const RANK_BY_ID=Object.fromEntries(RANKS.map(r=>[r.id,r]));
const ELIMINATION=151;
const CARD_MALUS_MAX=51;
const STORAGE_KEY='rami-v2';
function generateId(){
  return Array.from(crypto.getRandomValues(new Uint8Array(7)))
    .map(b=>'abcdefghijklmnopqrstuvwxyz0123456789'[b%36]).join('');
}
function getUrlGameId(){return new URLSearchParams(window.location.search).get('g')||null}
function setUrlGameId(id){const u=new URL(window.location.href);u.searchParams.set('g',id);window.history.replaceState({},'',u);}
let gameId=getUrlGameId()||(()=>{const id=generateId();setUrlGameId(id);return id})();
let syncChannel=null,syncTimer=null,lastCloudJson=null,syncStatus='ok';

const PLAYER_COLORS=['#e84545','#4ade80','#c9a227','#7888a8'];
const PLAYER_TEXT =['#f4ecd8','#1a0a2e','#1a0a2e','#f4ecd8'];

const PRESET_NAMES=['Redouane','Hlyba','Hicham','Nabil','Karim','Fouad','Aziz','Ali','Hakim'];
const CUSTOM_NAMES_KEY='rami-custom-names';
let customNames=[];
try{customNames=JSON.parse(localStorage.getItem(CUSTOM_NAMES_KEY)||'[]')}catch(e){}
const playerOtherMode=new Set();

function allNames(){return[...PRESET_NAMES,...customNames]}
function persistCustomName(name){
  name=name.trim();
  if(!name||allNames().includes(name))return false;
  customNames.push(name);
  try{localStorage.setItem(CUSTOM_NAMES_KEY,JSON.stringify(customNames))}catch(e){}
  return true;
}

let state=loadState()||freshSetup();
let toastTimer=null;
let audioCtx=null;
const audioBuffers={};
const htmlAudios={};
let audioUnlocked=false;
let lastSnippetKey=null;

function freshSetup(){
  return{
    screen:'setup',nbPlayers:4,
    players:[
      {name:'',score:0,eliminated:false},
      {name:'',score:0,eliminated:false},
      {name:'',score:0,eliminated:false},
      {name:'',score:0,eliminated:false},
    ],
    dealerIdx:0,rounds:[],tab:'enter',draft:emptyDraft(),
    playForCoffee:null,coffeeDebts:[],
  };
}
function emptyDraft(){return{jokerRank:null,jokerSuit:null,started:false,perPlayer:{}}}
// perPlayer entry shape: {isWinner, malus, cardCounts, p51noFollow, p51badLay, parole, etale}
function emptyCardCounts(){return Object.fromEntries(RANKS.map(r=>[r.id,0]))}
function normalizeCardCounts(cardCounts){
  const clean=emptyCardCounts();
  if(cardCounts&&typeof cardCounts==='object'){
    RANKS.forEach(r=>{
      const qty=parseInt(cardCounts[r.id],10);
      clean[r.id]=Number.isFinite(qty)&&qty>0?qty:0;
    });
  }
  return clean;
}
function hasCardCounts(cardCounts){return RANKS.some(r=>(cardCounts?.[r.id]||0)>0)}
function cardCountsTotal(cardCounts){
  const counts=normalizeCardCounts(cardCounts);
  return RANKS.reduce((sum,r)=>sum+(counts[r.id]||0)*r.pts,0);
}
function cardCountsSummary(cardCounts){
  const counts=normalizeCardCounts(cardCounts);
  return RANKS.filter(r=>counts[r.id]>0).map(r=>`${r.label}×${counts[r.id]}`).join(' · ');
}
function cardCalculatorValue(cardCounts){
  const counts=normalizeCardCounts(cardCounts);
  if(!hasCardCounts(counts))return{malus:null,rawTotal:0,cardCounts:null,summary:'',capped:false};
  const rawTotal=cardCountsTotal(counts);
  return{malus:Math.min(rawTotal,CARD_MALUS_MAX),rawTotal,cardCounts:counts,summary:cardCountsSummary(counts),capped:rawTotal>CARD_MALUS_MAX};
}
function entryCardSummary(entry){
  return hasCardCounts(entry?.cardCounts)?`Cartes : ${cardCountsSummary(entry.cardCounts)}`:'';
}
function cardCalculatorMeta(playerIdx,cardCounts){
  const p=state.players[playerIdx]||{score:0};
  const result=cardCalculatorValue(cardCounts);
  const projected=result.malus==null?p.score:p.score+result.malus;
  return{
    ...result,
    hasCards:result.malus!=null,
    playerScore:p.score,
    projected,
    willOut:result.malus!=null&&projected>=ELIMINATION,
  };
}
function normalizeState(s){if(!s.draft)s.draft=emptyDraft();if(s.playForCoffee===undefined)s.playForCoffee=null;if(!s.coffeeDebts)s.coffeeDebts=[];}
function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}
  saveToCloud();
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return null;
    const s=JSON.parse(raw);
    normalizeState(s);
    return s;
  }catch(e){return null}
}
function resetGame(){
  localStorage.removeItem(STORAGE_KEY);
  state=freshSetup();
  gameId=generateId();
  setUrlGameId(gameId);
  if(syncChannel){db.removeChannel(syncChannel);syncChannel=null;}
  saveToCloud();
  subscribeToSession(gameId);
  render();
}

// ---- Cloud sync ----
function updateSyncDot(){
  const el=document.getElementById('sync-dot');
  if(!el)return;
  const cfg={ok:['#4ade80','Synchronisé ✓'],saving:['var(--orange)','Sync…'],error:['var(--red)','Hors ligne']};
  const[col,lbl]=cfg[syncStatus]||cfg.ok;
  el.style.background=col;el.title=lbl;
}
function saveToCloud(){
  if(!gameId)return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    syncStatus='saving';updateSyncDot();
    try{
      const snap=JSON.stringify(state);
      await db.from('sessions').upsert({id:gameId,state:JSON.parse(snap),updated_at:new Date().toISOString()},{onConflict:'id'});
      lastCloudJson=snap;syncStatus='ok';
    }catch(e){syncStatus='error';console.warn('[sync]',e);}
    updateSyncDot();
  },800);
}
function subscribeToSession(id){
  if(syncChannel){db.removeChannel(syncChannel);syncChannel=null;}
  syncChannel=db.channel(`rami:${id}`)
    .on('postgres_changes',{event:'*',schema:'public',table:'sessions',filter:`id=eq.${id}`},payload=>{
      const inc=JSON.stringify(payload.new?.state);
      if(!inc||inc===lastCloudJson)return;
      const s=payload.new.state;normalizeState(s);
      state=s;lastCloudJson=inc;
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}
      render();
    })
    .subscribe();
}
async function initSession(){
  const urlId=getUrlGameId();
  if(urlId&&urlId!==gameId){
    try{
      const{data,error}=await db.from('sessions').select('state').eq('id',urlId).single();
      if(!error&&data?.state){normalizeState(data.state);state=data.state;gameId=urlId;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}render();}
    }catch(e){console.warn('[sync] load failed',e);}
  }else{
    saveToCloud();
  }
  subscribeToSession(gameId);
}

function activeIndices(){return state.players.map((p,i)=>({p,i})).filter(o=>!o.p.eliminated).map(o=>o.i)}
function nextActiveAfter(idx){
  const n=state.players.length;
  for(let k=1;k<=n;k++){const j=(idx+k)%n;if(!state.players[j].eliminated)return j}
  return idx;
}
function nextActiveBefore(idx){
  const n=state.players.length;
  for(let k=1;k<=n;k++){const j=(idx-k+n)%n;if(!state.players[j].eliminated)return j}
  return idx;
}
function ensureDealerActive(){if(state.players[state.dealerIdx]?.eliminated)state.dealerIdx=nextActiveAfter(state.dealerIdx)}
function pickRandomDealer(){const a=activeIndices();state.dealerIdx=a[Math.floor(Math.random()*a.length)]}

function scoreTone(s){if(s>=100)return'danger';if(s>=70)return'warn';return'safe'}
function barColor(s){if(s<70)return'var(--green)';if(s<100)return'var(--orange)';return'var(--red)'}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function avatar(name,idx,size){
  const bg=PLAYER_COLORS[idx%4];
  const fg=PLAYER_TEXT[idx%4];
  const init=name?name.trim().slice(0,2).toUpperCase():String(idx+1);
  return`<div class="avatar av-${size}" style="background:${bg};color:${fg};">${esc(init)}</div>`;
}

function cardHTML(rankId,suitId,small=false){
  const sz=small?' small':'';
  if(!rankId||!suitId)return`<div class="card-face flip${sz}">?</div>`;
  const r=RANK_BY_ID[rankId],s=SUIT_BY_ID[suitId];
  const cls=s.color==='red'?'red':'black';
  return`<div class="card-face ${cls}${sz}"><div class="corner tl"><span class="v">${r.label}</span><span class="s">${s.glyph}</span></div><div class="center">${s.glyph}</div><div class="corner br"><span class="v">${r.label}</span><span class="s">${s.glyph}</span></div></div>`;
}

function jokerCandidateSuits(suitId){
  const baseSuit=SUIT_BY_ID[suitId];
  if(!baseSuit)return[];
  return SUITS.filter(s=>s.color!==baseSuit.color);
}

function jokerCardsHTML(rankId,suitId,small=false){
  const suits=jokerCandidateSuits(suitId);
  const cls=`joker-result${small?' small':''}`;
  const cards=suits.length
    ? suits.map(s=>cardHTML(rankId,s.id,small))
    : [cardHTML(null,null,small),cardHTML(null,null,small)];
  return`<div class="${cls}">${cards.join('<span class="joker-sep">ou</span>')}</div>`;
}

function jokerText(rankId,suitId){
  const r=RANK_BY_ID[rankId],s=SUIT_BY_ID[suitId];
  if(!r||!s)return'?';
  const col=s.color==='red'?'var(--red)':'var(--blue-gray-2)';
  return`<span style="color:${col};font-weight:700;font-family:var(--display);">${r.label}${s.glyph}</span>`;
}

function jokerOppositeText(rankId,suitId){
  const r=RANK_BY_ID[rankId];
  const suits=jokerCandidateSuits(suitId);
  if(!r||!suits.length)return'?';
  return suits.map(s=>{
    const col=s.color==='red'?'var(--red)':'var(--blue-gray-2)';
    return`<span style="color:${col};font-weight:700;font-family:var(--display);">${r.label}${s.glyph}</span>`;
  }).join(`<span style="color:var(--text-muted);font-size:11px;margin:0 3px;">ou</span>`);
}

function showToast(text,ms=2400){
  document.getElementById('toast')?.remove();
  if(toastTimer)clearTimeout(toastTimer);
  const t=document.createElement('div');
  t.id='toast';t.className='toast';t.textContent=text;
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(),ms);
}
function resolveAppUrl(path){
  const href=window.location.href;
  const pathname=window.location.pathname;
  const hasHtmlFile=/\/[^/]+\.html?$/i.test(pathname);
  const baseHref=hasHtmlFile||href.endsWith('/')?href:`${href}/`;
  return new URL(path,baseHref).href;
}
const AUDIO_SRCS={
  elimination:resolveAppUrl('assets/audio/joueur-sorti.m4a'),
  noFollow:resolveAppUrl('assets/audio/sans-suivi-51.m4a'),
  badLay:resolveAppUrl('assets/audio/etalage-incomplet.m4a'),
  hakim:resolveAppUrl('assets/audio/hakim-selection.m4a'),
  snippet8:resolveAppUrl('assets/audio/snippet-8.m4a'),
  snippet9:resolveAppUrl('assets/audio/snippet-9.m4a'),
};
const SNIPPET_KEYS=['snippet8','snippet9'];
function isHakimName(name){return String(name||'').trim().toLowerCase()==='hakim'}

function getAudioCtx(){
  if(!audioCtx){
    const Cls=window.AudioContext||window.webkitAudioContext;
    if(Cls)audioCtx=new Cls();
  }
  return audioCtx;
}

function getHtmlAudio(key){
  if(!htmlAudios[key]){
    const a=new Audio(AUDIO_SRCS[key]);
    a.preload='auto';
    a.load();
    htmlAudios[key]=a;
  }
  return htmlAudios[key];
}

function loadAudioBuffer(key,url){
  if(audioBuffers[key])return Promise.resolve(audioBuffers[key]);
  return fetch(url)
    .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.arrayBuffer();})
    .then(arr=>new Promise((res,rej)=>{
      const ctx=getAudioCtx();
      if(!ctx)throw new Error('no ctx');
      ctx.decodeAudioData(arr,res,rej);
    }))
    .then(buf=>{audioBuffers[key]=buf;return buf;})
    .catch(err=>{console.warn('[audio] load failed:',key,err);return null;});
}

function unlockAudio(){
  if(audioUnlocked)return;
  audioUnlocked=true;
  const ctx=getAudioCtx();
  if(ctx&&ctx.state==='suspended')ctx.resume().catch(()=>{});
  Object.entries(AUDIO_SRCS).forEach(([k,url])=>loadAudioBuffer(k,url));
  Object.keys(AUDIO_SRCS).forEach(key=>{
    const a=getHtmlAudio(key);
    a.muted=true;
    const p=a.play();
    if(p&&p.then)p.then(()=>{a.pause();a.currentTime=0;a.muted=false;}).catch(()=>{a.muted=false;});
    else{a.pause();a.currentTime=0;a.muted=false;}
  });
}

function playAudioKey(key){
  const ctx=getAudioCtx();
  const buf=ctx?audioBuffers[key]:null;
  if(ctx&&buf){
    try{
      if(ctx.state==='suspended')ctx.resume().catch(()=>{});
      const src=ctx.createBufferSource();
      src.buffer=buf;
      src.connect(ctx.destination);
      src.start(0);
      return;
    }catch(e){console.warn('[audio] ctx play failed:',e);}
  }
  const a=getHtmlAudio(key);
  a.pause();a.currentTime=0;
  a.play().catch(e=>console.warn('[audio] html play failed:',key,e));
}

function playRandomSnippet(){
  let key=SNIPPET_KEYS[Math.floor(Math.random()*SNIPPET_KEYS.length)];
  if(SNIPPET_KEYS.length>1&&key===lastSnippetKey)key=SNIPPET_KEYS.find(k=>k!==lastSnippetKey)||key;
  lastSnippetKey=key;
  playAudioKey(key);
}

      players:state.players,

      finished:true,

  }catch(e){}

              <div class="seat" style="background:${PLAYER_COLORS[i]}22;border:2px solid ${PLAYER_COLORS[i]};color:${PLAYER_COLORS[i]};flex:0 0 38px;">${i+1}</div>
              <div class="name-select-wrap">
                <select data-act="nameSelect" data-i="${i}">
                  <option value="">— Joueur ${i+1} —</option>
                  ${names.map(n=>`<option value="${esc(n)}" ${selectVal===n?'selected':''}>${esc(n)}</option>`).join('')}
                  <option value="__autre__" ${isOther?'selected':''}>✎ Autre…</option>
                </select>
              </div>
            </div>
            ${isOther?`<div class="autre-row" style="padding-left:50px;">
              <input type="text" placeholder="Nouveau nom…" value="${esc(isOther&&p.name&&!PRESET_NAMES.includes(p.name)?p.name:'')}" data-act="customNameInput" data-i="${i}" maxlength="20" autocomplete="off" autocapitalize="words"/>
              <button type="button" class="btn-save" data-act="addCustomName" data-i="${i}">Enregistrer</button>
            </div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="panel panel-gold">
      <div class="panel-title">Règles</div>
      <ul style="list-style:none;padding:0;font-size:15px;color:var(--text-dim);line-height:1.8;">
        <li>◆ Élimination à <strong style="color:var(--red)">151 points</strong></li>
        <li>◆ A / V / D / R = 10 pts · cartes numériques = valeur</li>
        <li>◆ Pénalité <strong style="color:var(--gold-soft)">+51</strong> sans suivi ou étalage erroné</li>
        <li>◆ Joker = même valeur, couleur opposée (rouge → ♠/♣ · noir → ♥/♦)</li>
        <li>◆ Parole : même distrib. si non commencé, sinon distrib. avance</li>
      </ul>
    </div>
    <button class="btn btn-primary btn-block" data-act="startGame">Commencer la partie ›</button>
  </div>`;
}

function viewGame(){
  const body=
    state.tab==='scores'?viewScores():
    state.tab==='history'?viewHistory():
    state.tab==='tableau'?viewTableau():
    viewEnter();
  return`<div class="content fade-in">${body}</div>${viewTabs()}`;
}

function viewTabs(){
  const t=state.tab;
  return`<nav class="tabs"><div class="tabs-inner">
    <button class="tab ${t==='scores'?'active':''}" data-act="setTab" data-tab="scores"><span class="ico">♛</span><span class="lbl">Scores</span></button>
    <button class="tab ${t==='enter'?'active':''}" data-act="setTab" data-tab="enter"><span class="ico">✎</span><span class="lbl">Saisir</span></button>
    <button class="tab ${t==='tableau'?'active':''}" data-act="setTab" data-tab="tableau"><span class="ico">⊞</span><span class="lbl">Tableau</span></button>
    <button class="tab ${t==='history'?'active':''}" data-act="setTab" data-tab="history"><span class="ico">❦</span><span class="lbl">Historique</span></button>
    <button class="tab" data-act="resetConfirm"><span class="ico" style="font-size:18px;">✦</span><span class="lbl">Nouveau</span></button>
  </div></nav>`;
}

function viewScores(){
  const dealer=state.dealerIdx;
  const roundNum=state.rounds.length+1;
  return`
    <div class="panel panel-gold" style="text-align:center;">
      <div style="font-family:var(--display);font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-soft);">Tour ${roundNum}</div>
      <div style="font-family:var(--display);font-size:20px;color:var(--text);margin-top:4px;">
        Distributeur : <em style="color:var(--gold-soft);">${esc(state.players[dealer].name)||'—'}</em>
      </div>
    </div>
    ${state.players.map((p,i)=>{
      const pct=Math.min(100,Math.round((p.score/ELIMINATION)*100));
      const remaining=Math.max(0,ELIMINATION-p.score);
      return`<div class="score-card ${i===dealer?'dealer':''} ${p.eliminated?'eliminated':''}">
        <div class="score-head">
          <div class="score-name">
            ${avatar(p.name,i,'lg')}
            <span>${esc(p.name)}</span>
            ${i===dealer&&!p.eliminated?`<span class="badge badge-dealer">Donne</span>`:''}
            ${p.eliminated?`<span class="badge badge-out">Éliminé</span>`:''}
            <button data-act="openRename" data-i="${i}" style="background:none;border:none;color:var(--text-muted);font-size:14px;padding:2px 5px;cursor:pointer;line-height:1;border-radius:4px;" title="Renommer">✎</button>
          </div>
          <button data-act="openCorrection" data-i="${i}" class="score-pts ${scoreTone(p.score)}" title="Corriger le score" style="background:none;border:none;cursor:pointer;font:inherit;">${p.score}</button>
        </div>
        <div class="progress"><div class="progress-bar" style="width:${pct}%;background:${barColor(p.score)};"></div></div>
        <div class="score-meta">
          <span>${p.eliminated?'Hors course':`${remaining} pts avant ${ELIMINATION}`}</span>
          <span>${state.rounds.length} tour${state.rounds.length!==1?'s':''}</span>
        </div>
      </div>`;
    }).join('')}
    <div style="display:flex;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap;">
      <button class="btn btn-outline" style="font-size:11px;padding:6px 14px;opacity:.55;" data-act="testAudio">🔊 Sons</button>
      <button class="btn btn-outline" style="font-size:11px;padding:6px 14px;" data-act="shareGame">📲 Partager</button>
    </div>
  `;
}

function viewEnter(){
  ensureDealerActive();
  const d=state.draft;
  const dealer=state.dealerIdx;
  const active=activeIndices();
  const allParole=active.length>0&&active.every(i=>d.perPlayer[i]?.parole);
  const winnerIdx=active.find(i=>d.perPlayer[i]?.isWinner);
  const etBadLayIdx=active.find(i=>d.perPlayer[i]?.p51badLay);
  const isEtIncompletDraft=etBadLayIdx!=null&&winnerIdx==null;
  const anyMalusEntered=active.some(i=>{const e=d.perPlayer[i]||{};return!e.isWinner&&!e.p51noFollow&&!e.p51badLay&&!e.parole&&e.malus!==null&&e.malus!==undefined&&!isNaN(e.malus);});
  const hasJoker=d.jokerRank&&d.jokerSuit;
  const redistributionDealerIdx=d.started?nextActiveAfter(dealer):dealer;
  const redistributionDealerName=state.players[redistributionDealerIdx]?.name||'—';

  return`
    <div class="panel panel-gold">
      <div class="panel-title">Tour ${state.rounds.length+1}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;">
        ${avatar(state.players[dealer].name,dealer,'lg')}
        <div>
          <div style="font-family:var(--display);font-size:24px;">${esc(state.players[dealer].name)}</div>
          <div style="font-style:italic;color:var(--text-muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase;">Distributeur</div>
        </div>
      </div>
    </div>

    ${hasJoker?`
    <div class="panel" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;">
      <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.14em;">Joker du tour</div>
      <div style="font-size:18px;display:flex;align-items:center;gap:8px;">
        ${jokerText(d.jokerRank,d.jokerSuit)}
        <span style="color:var(--gold);font-size:14px;">→</span>
        ${jokerOppositeText(d.jokerRank,d.jokerSuit)}
      </div>
    </div>`:''}

    <div class="panel">
      <div class="switch-row">
        <div class="lbl">Tour commencé<em>Au moins une carte tirée du talon</em></div>
        <button class="switch ${d.started?'on':''}" data-act="toggleStarted"></button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">${allParole?'Tous parole':winnerIdx!=null?'Gagnant sélectionné':'Sélectionner le gagnant'}</div>
      ${active.map(i=>{
        const e=d.perPlayer[i]||{};
        const isWin=!!e.isWinner,isPar=!!e.parole;
        const hasPenalty=e.p51noFollow||e.p51badLay;
        const penaltyTotal=(e.p51noFollow?51:0)+(e.p51badLay?51:0);
        const cls='player-entry'+(isWin?' is-winner':'')+(isPar?' is-parole':'');
        return`<div class="${cls}">
          <div class="player-entry-head">
            <div class="player-name">
              ${avatar(state.players[i].name,i,'sm')}
              ${esc(state.players[i].name)}
              ${i===dealer?`<span class="badge badge-dealer" style="font-size:9px;">Donne</span>`:''}
            </div>
            <button class="winner-pick ${isWin?'on':''}" data-act="pickWinner" data-i="${i}" ${isPar?'disabled style="opacity:.4"':''}>★</button>
          </div>
          ${isWin
            ?`<div style="font-style:italic;color:var(--gold-soft);font-size:14px;">★ Gagnant — 0 pt de malus</div>`
            :hasPenalty
              ?`<div style="font-style:italic;color:var(--red);font-size:15px;">Pénalité : +${penaltyTotal} pts</div>`
              :!isPar?`
                <div>
                  <div class="malus-input" style="margin-bottom:10px;"><input type="number" inputmode="numeric" min="0" max="300" placeholder="Points de cartes restantes" value="${e.malus??''}" data-act="setMalus" data-i="${i}"></div>
                  <button class="calc-launch" data-act="openCalc" data-i="${i}">Calculatrice cartes</button>
                </div>
                ${hasCardCounts(e.cardCounts)?`<div class="calc-note">${entryCardSummary(e)}</div>`:''}
              `:''
          }
          <div class="penalty-toggle">
            <button class="chip chip-parole ${isPar?'on':''}" data-act="toggleParole" data-i="${i}">${isPar?'✓ ':''}Parole</button>
            <button class="chip ${e.p51noFollow?'on':''}" data-act="toggleP51nf" data-i="${i}" ${isPar||e.p51badLay?'disabled style="opacity:.4"':''}><span class="plus">+51</span> sans suivi</button>
            <button class="chip ${e.p51badLay?'on':''}" data-act="toggleP51be" data-i="${i}" ${isPar||e.p51noFollow||anyMalusEntered||(etBadLayIdx!=null&&etBadLayIdx!==i)?'disabled style="opacity:.4"':''}><span class="plus">+51</span> étalage incomplet</button>
          </div>
        </div>`;
      }).join('')}
    </div>

    ${allParole
      ?`<div class="panel" style="text-align:center;border-color:var(--blue-gray);">
          <div style="font-family:var(--display);font-size:18px;color:var(--blue-gray-2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;">Tous parole</div>
          <div style="font-style:italic;color:var(--text-muted);font-size:14px;">
            ${d.started?`Tour commencé — la donne passe à droite à ${esc(redistributionDealerName)}.`:`Tour non commencé — ${esc(redistributionDealerName)} redistribue.`}
          </div>
          <button class="btn btn-ghost btn-block mt-16" data-act="redistribute">↻ Redistribuer — ${d.started?`donne à ${esc(redistributionDealerName)}`:'même distributeur'}</button>
        </div>`
      :`<div style="display:flex;flex-direction:column;gap:10px;">
          <div class="row-flex">
            <button class="btn btn-ghost" data-act="clearDraft">Effacer</button>
            <button class="btn btn-primary" data-act="validateRound" ${winnerIdx==null&&!isEtIncompletDraft?'disabled':''}>
              ${isEtIncompletDraft?'Valider — Étalage incomplet ›':winnerIdx==null?'Choisir le gagnant ›':'Nouvelle distribution ›'}
            </button>
          </div>
          <button class="btn btn-ghost btn-block" data-act="redistribute" style="font-size:13px;">↻ Redistribuer — sans score</button>
        </div>`
    }`;
}

function viewHistory(){
  const savedSection=`<div class="panel" style="margin-top:16px;">
    <div class="panel-title">Parties précédentes</div>
    <div id="saved-parties"><div style="text-align:center;font-style:italic;color:var(--text-muted);padding:12px 0;">Chargement…</div></div>
  </div>`;
  if(!state.rounds.length)return`<div class="empty-history"><div class="ornament">❦</div><div style="font-family:var(--display);font-size:20px;color:var(--text-dim);margin-bottom:6px;">Aucun tour pour le moment</div><div>Saisis le premier tour dans l'onglet Saisir.</div></div>${savedSection}`;
  const undoBtn=`<button class="btn btn-ghost btn-block" data-act="undoRound" style="margin-bottom:14px;font-size:13px;">↩ Annuler le dernier tour</button>`;
  const localRounds=state.rounds.slice().reverse().map((r,ri)=>{
    const num=state.rounds.length-ri;
    const dealerName=state.players[r.dealerIdx]?.name||'—';
    if(r.correction){
      const cp=state.players[r.playerIdx];
      const sign=r.delta>=0?'+':'';
      return`<div class="round-card" style="border-color:rgba(201,162,39,.25);">
        <div class="round-head"><div class="round-num" style="color:var(--gold-soft);">✎ Correction</div></div>
        <div class="round-line">
          <div class="nm">${avatar(cp.name,r.playerIdx,'sm')}<span>${esc(cp.name)}</span></div>
          <span class="pt" style="color:${r.delta>=0?'var(--red)':'var(--green)'}">${sign}${r.delta} pts</span>
        </div>
      </div>`;
    }
    if(r.parole)return`<div class="round-card"><div class="round-head"><div class="round-num">Tour ${num} · Parole</div><div class="round-dealer">${esc(dealerName)}</div></div><div class="round-parole">↻ Redistribution ${r.dealerAdvanced?'· donne passée à droite':'· même distributeur'}</div></div>`;
    return`<div class="round-card">
      <div class="round-head"><div class="round-num">Tour ${num}</div><div class="round-dealer">${esc(dealerName)} donne</div></div>
      ${r.jokerRank&&r.jokerSuit?`<div class="round-joker"><span class="mini-tag">Joker :</span><span style="font-size:16px;margin:0 6px;">${jokerText(r.jokerRank,r.jokerSuit)}</span><span class="joker-arrow" style="font-size:14px;">→</span><span style="font-size:16px;margin-left:6px;">${jokerOppositeText(r.jokerRank,r.jokerSuit)}</span></div>`:''}
      ${r.entries.map(e=>{
        const tags=[];
        if(e.p51noFollow)tags.push('+51 sans suivi');
        if(e.p51badLay)tags.push('+51 étalage');
        const p=state.players[e.idx];
        return`<div class="round-line">
          <div class="nm ${e.isWinner?'win':''}">
            ${avatar(p.name,e.idx,'sm')}
            <span>${esc(p.name)}${e.isWinner?' ★':''}</span>
            ${tags.length?`<span class="tags">${tags.join(' · ')}</span>`:''}
          </div>
          <span class="pt" style="color:${e.isWinner?'var(--gold-soft)':e.delta>=51?'var(--red)':'var(--text-dim)'}">+${e.delta}</span>
          <button data-act="openCorrection" data-i="${e.idx}" style="background:none;border:1px solid var(--line-soft);color:var(--text-muted);font-size:11px;padding:2px 7px;border-radius:6px;cursor:pointer;white-space:nowrap;margin-left:4px;">±</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
  return undoBtn+localRounds+savedSection;
}

function viewFinished(){
  const sorted=state.players.map((p,i)=>({...p,idx:i})).sort((a,b)=>{
    if(a.eliminated!==b.eliminated)return a.eliminated?1:-1;
    return a.score-b.score;
  });
  const winners=sorted.filter(p=>!p.eliminated);
  const plural=winners.length>1;
  const winnersHeader=plural
    ?`<div style="display:flex;align-items:center;justify-content:center;gap:18px;margin:16px 0 8px;flex-wrap:wrap;">
        ${winners.map(w=>`<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">${avatar(w.name,w.idx,'lg')}<div class="winner-name" style="font-size:22px;">${esc(w.name)}</div></div>`).join('')}
      </div>
      <div class="winner-sub">${winners.map(w=>w.score+' pts').join(' · ')} · co-vainqueurs</div>`
    :`<div style="display:flex;align-items:center;justify-content:center;gap:14px;margin:16px 0 8px;">
        ${avatar(winners[0].name,winners[0].idx,'lg')}
        <div class="winner-name">${esc(winners[0].name)}</div>
      </div>
      <div class="winner-sub">${winners[0].score} points · partie remportée</div>`;
  return`<div class="content no-tabs fade-in">
    <div class="gameover">
      <div class="crown">♛</div>
      <h2>${plural?'Vainqueurs':'Vainqueur'}</h2>
      ${winnersHeader}
    </div>
    <div class="panel">
      <div class="panel-title">Classement final</div>
      ${sorted.map((p,i)=>{
        const isWinner=!p.eliminated;
        return`<div class="ranking-row ${isWinner?'gold':''}">
          <div class="pos">${isWinner?'★':i+1}</div>
          ${avatar(p.name,p.idx,'md')}
          <div class="nm">${esc(p.name)} ${p.eliminated?`<span class="badge badge-out" style="font-size:9px;">Éliminé</span> <span style="font-size:18px;">☕</span>`:''}</div>
          <div class="pt">${p.score} pts</div>
        </div>`;
      }).join('')}
    </div>
    <div class="panel">
      <div class="panel-title">Récapitulatif</div>
      <div style="font-style:italic;color:var(--text-muted);text-align:center;font-size:14px;">${state.rounds.length} tour${state.rounds.length!==1?'s':''} joués · Le salon ferme ses portes…</div>
    </div>
    ${state.playForCoffee&&state.coffeeDebts?.length?`
    <div class="panel" style="border-color:rgba(201,162,39,.4);">
      <div class="panel-title">☕ Consommations</div>
      ${(()=>{
        const losers=[...new Set(state.coffeeDebts.map(d=>d.from))];
        const allDebtsSettled=state.coffeeDebts.every(d=>d.settled);
        return losers.map(li=>{
          const lDebts=state.coffeeDebts.filter(d=>d.from===li);
          const allOk=lDebts.every(d=>d.settled);
          const lp=state.players[li];
          return`<div style="margin-bottom:16px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
              ${avatar(lp.name,li,'sm')}
              <span style="font-family:var(--display);font-size:16px;">${esc(lp.name)}</span>
              <span style="font-size:11px;padding:2px 8px;border-radius:999px;${allOk?'background:rgba(74,222,128,.15);color:var(--green);':'background:rgba(232,69,69,.12);color:var(--red);'}">${allOk?'✓ Tout réglé':'☕ Café perdu'}</span>
            </div>
            ${lDebts.map(d=>{
              const wp=state.players[d.to];
              return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(15,6,32,.4);border-radius:10px;margin-bottom:6px;">
                <div style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-dim);">
                  <span style="color:var(--gold);">→</span>
                  ${avatar(wp.name,d.to,'sm')}
                  <span>${esc(wp.name)}</span>
                  <span style="font-size:11px;color:var(--gold-soft);">☕ Café gagné</span>
                </div>
                ${d.settled
                  ?`<span style="color:var(--green);font-size:13px;font-family:var(--display);font-weight:600;">✓ Réglé</span>`
                  :`<button class="btn btn-ghost" style="padding:6px 14px;font-size:12px;border-color:rgba(201,162,39,.4);color:var(--gold-soft);" data-act="settleCoffee" data-from="${li}" data-to="${d.to}">Régler ☕</button>`
                }
              </div>`;
            }).join('')}
          </div>`;
        }).join('')+`${allDebtsSettled?`<div style="text-align:center;color:var(--green);font-family:var(--display);font-size:16px;padding:8px 0;">✓ Toutes les consommations sont réglées</div>`:''}`;
      })()}
    </div>`:''}
    <button class="btn btn-primary btn-block" data-act="newGame">Nouvelle partie</button>
  </div>`;
}

function viewTableau(){
  ensureDealerActive();
  const d=state.draft;
  const dealer=state.dealerIdx;
  const n=state.players.length;
  const active=activeIndices();
  const winnerIdx=active.find(i=>d.perPlayer[i]?.isWinner);
  const nextDealerIdx=nextActiveAfter(dealer);

  const pastRows=state.rounds.map((r,ri)=>{
    if(r.correction)return'';
    const rowHtml=state.players.map((p,i)=>{
      if(r.parole){
        return`<td><div class="ci"><span class="ic ic-par">↻</span></div></td>`;
      }
      const e=r.entries.find(x=>x.idx===i);
      if(!e){
        return`<td><div class="ci"><span class="ci-out">—</span></div></td>`;
      }
      const chips=[];
      if(r.dealerIdx===i)chips.push(`<span class="ic ic-d-past">d</span>`);
      if(e.etale)chips.push(`<span class="ic ic-e">E</span>`);
      if(e.p51noFollow)chips.push(`<span class="ic ic-51">51</span>`);
      if(e.p51badLay)chips.push(`<span class="ic ic-51">51!</span>`);
      if(e.isWinner){
        return`<td><div class="ci ci-win">
          <span class="ci-total">★</span>
          ${chips.length?`<div class="ichips">${chips.join('')}</div>`:''}
        </div></td>`;
      }
      const hasPen=e.p51noFollow||e.p51badLay;
      const sign=e.delta>0?'+':'';
      return`<td><div class="ci ${hasPen?'ci-pen':''}">
        <span class="ci-total">${sign}${e.delta}</span>
        ${chips.length?`<div class="ichips">${chips.join('')}</div>`:''}
      </div></td>`;
    }).join('');
    return`<tr>${rowHtml}</tr>`;
  });

  // Current round cells
  const currentCells=state.players.map((p,i)=>{
    if(p.eliminated)return`<td><div class="ci"><span class="ci-out">Sorti</span></div></td>`;
    const e=d.perPlayer[i]||{};
    const isD=i===dealer;
    if(e.isWinner){
      return`<td class="ci-tap" data-act="tapCell" data-i="${i}"><div class="ci ci-win">${isD?'<span class="ic ic-d">D</span>':''}<span class="ci-total">★</span>${e.etale?'<span class="ic ic-e">E</span>':''}</div></td>`;
    }
    const hasPen=e.p51noFollow||e.p51badLay;
    const penPts=(e.p51noFollow?51:0)+(e.p51badLay?51:0);
    if(hasPen){
      const willOut=p.score+penPts>=ELIMINATION;
      return`<td class="ci-tap" data-act="tapCell" data-i="${i}"><div class="ci ci-pen">${isD?'<span class="ic ic-d">D</span>':''}<span class="ci-total">+${penPts}</span>${willOut?'<span class="ic ic-51" style="font-size:8px;margin-top:2px;">SORTI</span>':''}${e.etale?'<span class="ic ic-e">E</span>':''}</div></td>`;
    }
    if(e.malus!==null&&e.malus!==undefined&&!isNaN(e.malus)){
      const willOut=p.score+e.malus>=ELIMINATION;
      return`<td class="ci-tap" data-act="tapCell" data-i="${i}"><div class="ci ${willOut?'ci-pen':''}">${isD?'<span class="ic ic-d">D</span>':''}<span class="ci-total">+${e.malus}</span>${willOut?'<span class="ic ic-51" style="font-size:8px;margin-top:2px;">SORTI</span>':''}${e.etale?'<span class="ic ic-e">E</span>':''}</div></td>`;
    }
    if(e.etale){
      return`<td class="ci-tap" data-act="tapCell" data-i="${i}"><div class="ci ci-win">${isD?'<span class="ic ic-d">D</span>':''}<span class="ci-total">⤵</span><span class="ic ic-e" style="margin-top:2px;">Étalé</span></div></td>`;
    }
    return`<td class="ci-tap" data-act="tapCell" data-i="${i}"><div class="ci">${isD?'<span class="ic ic-d" style="margin-bottom:3px;">D</span>':''}<span style="color:var(--gold-soft);font-size:13px;font-family:var(--display);">Calcul</span></div></td>`;
  }).join('');

  // Validate button check
  const badLayIdx=active.find(i=>d.perPlayer[i]?.p51badLay);
  const isEtIncomplet=badLayIdx!=null&&winnerIdx==null;
  const canValidate=(winnerIdx!=null||isEtIncomplet)&&active.every(i=>{
    if(i===winnerIdx||isEtIncomplet)return true;
    const e=d.perPlayer[i]||{};
    if(e.parole||e.p51noFollow||e.p51badLay)return true;
    return e.malus!==null&&!isNaN(e.malus);
  });

  // Column headers
  const headers=state.players.map((p,i)=>{
    const s=p.score;
    const col=s>=100?'var(--red)':s>=70?'var(--orange)':'var(--green)';
    return`<th>
      ${avatar(p.name,i,'sm')}
      <div style="font-size:11px;margin-top:3px;color:var(--text-dim);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.name)}</div>
      <div class="th-pl-score" style="color:${col};">${s}</div>
    </th>`;
  }).join('');

  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <div style="font-family:var(--display);font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-soft);">Tour ${state.rounds.length+1}</div>
      <div style="font-size:13px;font-style:italic;color:var(--text-muted);">
        <span class="ic ic-d" style="padding:2px 5px;font-size:10px;">D</span> ${esc(state.players[dealer].name)}
      </div>
    </div>
    ${d.jokerRank&&d.jokerSuit?`
    <div style="text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:16px;">
      ${jokerText(d.jokerRank,d.jokerSuit)}
      <span style="color:var(--gold);font-size:13px;">→</span>
      ${jokerOppositeText(d.jokerRank,d.jokerSuit)}
    </div>`:''}
    <div class="tableau-wrap">
      <table class="stbl">
        <thead><tr>${headers}</tr></thead>
        <tbody>
          ${pastRows.join('')}
          <tr class="row-current">
            ${currentCells}
          </tr>
        </tbody>
        <tfoot>
          <tr class="row-total">
            ${state.players.map((p,i)=>{
              if(p.eliminated)return`<td><span style="color:var(--red);font-size:11px;">Sorti</span></td>`;
              const e=d.perPlayer[i]||{};
              let proj=p.score;
              if(e.isWinner)proj=p.score;
              else if(e.p51noFollow||e.p51badLay)proj=p.score+(e.p51noFollow?51:0)+(e.p51badLay?51:0);
              else if(e.malus!==null&&e.malus!==undefined&&!isNaN(e.malus))proj=p.score+e.malus;
              const willOut=proj>=ELIMINATION;
              const col=proj>=100?'var(--red)':proj>=70?'var(--orange)':'var(--green)';
              return`<td style="color:${col};font-weight:${proj!==p.score?'700':''};">${willOut?`<span style="color:var(--red);">${proj} ⚡</span>`:proj}${i===nextDealerIdx&&!p.eliminated?`<br><span class="ic ic-d-next" style="margin-top:3px;">d</span>`:''}</td>`;
            }).join('')}
          </tr>
        </tfoot>
      </table>
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin:8px 0 12px;display:flex;gap:10px;flex-wrap:wrap;">
      <span><span class="ic ic-d">D</span> Distributeur</span>
      <span><span class="ic ic-e">E</span> Étalé</span>
      <span><span class="ic ic-51">51</span> Pénalité</span>
    </div>
    <button class="btn btn-primary btn-block" data-act="validateRound" ${canValidate?'':'disabled'}>Nouvelle distribution ›</button>
    ${!canValidate?`<div style="text-align:center;font-style:italic;color:var(--text-muted);font-size:12px;margin-top:6px;">Touche une cellule <span style="color:var(--gold);">Calcul</span> pour saisir</div>`:''}
    <button class="btn btn-ghost btn-block" data-act="redistribute" data-started="1" style="margin-top:8px;font-size:13px;">↻ Redistribuer — sans score</button>`;
}

function undoLastRound(){
  if(!state.rounds.length){showToast('Aucun tour à annuler');return}
  const last=state.rounds[state.rounds.length-1];
  if(!last.parole){
    last.entries.forEach(e=>{
      state.players[e.idx].score-=e.delta;
      state.players[e.idx].eliminated=state.players[e.idx].score>=ELIMINATION;
    });
  }
  state.rounds.pop();
  state.draft=emptyDraft();
  if(state.screen==='finished')state.screen='game';
  render();
  showToast('Tour annulé ↩');
}

function autoCompleteRound(){
  if(state.screen!=='game')return;
  const d=state.draft;
  const active=activeIndices();
  // Étalage incomplet: auto-fill malus=0 for all others, no winner
  const badLayIdx=active.find(i=>d.perPlayer[i]?.p51badLay);
  if(badLayIdx!=null){
    active.forEach(i=>{
      if(i===badLayIdx)return;
      const e=d.perPlayer[i]||{};
      if(!e.parole&&!e.p51noFollow&&!e.p51badLay){
        d.perPlayer[i]=d.perPlayer[i]||{};
        d.perPlayer[i].malus=0;
        d.perPlayer[i].isWinner=false;
      }
    });
    return;
  }
  // Normal round: auto-set winner when all others are filled
  if(active.some(i=>d.perPlayer[i]?.isWinner))return;
  const filled=active.filter(i=>{
    const e=d.perPlayer[i]||{};
    return e.parole||e.p51noFollow||e.p51badLay||(e.malus!==null&&e.malus!==undefined&&!isNaN(e.malus));
  });
  if(filled.length===active.length-1){
    const auto=active.find(i=>!filled.includes(i));
    if(auto!=null){
      d.perPlayer[auto]=d.perPlayer[auto]||{};
      d.perPlayer[auto].isWinner=true;
    }
  }
}

// ---- Event handling ----
document.addEventListener('click',ev=>{
  const t=ev.target.closest('[data-act]');
  if(!t)return;
  switch(t.dataset.act){
    case 'setN':{
      const n=+t.dataset.n;
      state.nbPlayers=n;
      while(state.players.length<n)state.players.push({name:'',score:0,eliminated:false});
      render();break;
    }
    case 'addCustomName':{
      const i=+t.dataset.i;
      const field=getCustomNameField(i);
      commitCustomName(i,field?field.value:state.players[i].name);
      break;
    }
    case 'startGame':{
      const names=state.players.slice(0,state.nbPlayers).map(p=>p.name.trim());
      if(names.some(n=>!n)){showToast('Saisis tous les noms');return}
      state.players=names.map(n=>({name:n,score:0,eliminated:false}));
      state.rounds=[];state.draft=emptyDraft();state.screen='pickDealer';state.tab='enter';
      render();break;
    }
    case 'chooseDealer':{
      const i=+t.dataset.i;
      state.dealerIdx=i;
      state.screen='pickJoker';
      render();
      break;
    }
    case 'confirmJoker':{
      if(!state.draft.jokerRank||!state.draft.jokerSuit){showToast('Sélectionne le joker du tour');return;}
      if(state.playForCoffee===null){
        state.screen='pickCoffee';
      }else{
        state.screen='game';state.tab='enter';
        playRandomSnippet();
      }
      render();break;
    }
    case 'setCoffee':{
      state.playForCoffee=t.dataset.v==='1';
      state.screen='game';state.tab='enter';
      render();
      playRandomSnippet();
      showToast(state.playForCoffee?'☕ On joue pour la consommation !':'Partie sans consommation');
      break;
    }
    case 'setTab':closeCardCalculator();closeSheet();state.tab=t.dataset.tab;render();break;
    case 'tapCell':{
      const i=+t.dataset.i;
      if(!state.players[i].eliminated)openSheet(i);
      break;
    }
    case 'openCalc':openCardCalculator('draft',+t.dataset.i);break;
    case 'pickRank':state.draft.jokerRank=t.dataset.r;render();break;
    case 'pickSuit':state.draft.jokerSuit=t.dataset.s;render();break;
    case 'toggleStarted':state.draft.started=!state.draft.started;render();break;
    case 'pickWinner':{
      const i=+t.dataset.i;
      if(state.draft.perPlayer[i]?.parole)return;
      const cur=state.draft.perPlayer[i]?.isWinner;
      activeIndices().forEach(j=>{if(state.draft.perPlayer[j])state.draft.perPlayer[j].isWinner=false});
      if(!cur){
        state.draft.perPlayer[i]=state.draft.perPlayer[i]||{};
        state.draft.perPlayer[i].isWinner=true;
        state.draft.perPlayer[i].malus=0;
        state.draft.perPlayer[i].cardCounts=null;
      }
      state.draft.started=true;render();break;
    }
    case 'toggleParole':{
      const i=+t.dataset.i;
      const e=state.draft.perPlayer[i]=state.draft.perPlayer[i]||{};
      e.parole=!e.parole;
      if(e.parole){e.isWinner=false;e.malus=0;e.cardCounts=null;e.p51noFollow=false;e.p51badLay=false}
      state.draft.started=true;render();break;
    }
    case 'toggleP51nf':{
      const i=+t.dataset.i;
      const e=state.draft.perPlayer[i]=state.draft.perPlayer[i]||{};
      if(!e.parole&&!e.p51badLay){e.p51noFollow=!e.p51noFollow;state.draft.started=true;render()}
      break;
    }
    case 'toggleP51be':{
      const i=+t.dataset.i;
      const e=state.draft.perPlayer[i]=state.draft.perPlayer[i]||{};
      if(!e.parole&&!e.p51noFollow){e.p51badLay=!e.p51badLay;state.draft.started=true;render()}
      break;
    }
    case 'undoRound':if(confirm('Annuler le dernier tour et corriger les scores ?'))undoLastRound();break;
    case 'settleCoffee':{
      const from=+t.dataset.from,to=+t.dataset.to;
      const debt=state.coffeeDebts.find(d=>d.from===from&&d.to===to);
      if(debt){debt.settled=true;saveState();render();}
      break;
    }
    case 'redistribute':if(t.dataset.started==='1')state.draft.started=true;handleRedistribute();break;
    case 'validateRound':handleValidateRound();break;
    case 'clearDraft':state.draft=emptyDraft();render();showToast('Saisie effacée');break;
    case 'testAudio':unlockAudio();playRandomSnippet();showToast('🔊 Test son…');break;
    case 'openCorrection':openCorrectionOverlay(+t.dataset.i);break;
    case 'openRename':openRenameOverlay(+t.dataset.i);break;
    case 'shareGame':{
      const url=window.location.href;
      const text=`Rejoins notre partie de Rami 🃏\n${url}`;
      if(navigator.share){navigator.share({title:'Partie de Rami',text,url}).catch(()=>{});}
      else{window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,'_blank');}
      break;
    }
    case 'resetConfirm':if(confirm('Terminer la partie et en commencer une nouvelle ?'))resetGame();break;
    case 'newGame':resetGame();break;
  }
});

function handleRedistribute(){
  const wasStarted=state.draft.started;
  state.rounds.push({parole:true,dealerIdx:state.dealerIdx,started:wasStarted,dealerAdvanced:wasStarted,jokerRank:state.draft.jokerRank,jokerSuit:state.draft.jokerSuit,entries:[]});
  if(wasStarted)state.dealerIdx=nextActiveAfter(state.dealerIdx);
  const nextDealerName=state.players[state.dealerIdx]?.name||'—';
  state.draft=emptyDraft();
  state.screen='pickJoker';
  render();
  playRandomSnippet();
  showToast(wasStarted?`Nouvelle distribution · ${nextDealerName} donne`:`Nouvelle distribution · ${nextDealerName} redonne`);
}

function handleValidateRound(){
  const d=state.draft;
  const active=activeIndices();
  const winnerIdx=active.find(i=>d.perPlayer[i]?.isWinner);
  const badLayIdx=active.find(i=>d.perPlayer[i]?.p51badLay);
  const isEtIncomplet=badLayIdx!=null&&winnerIdx==null;
  if(winnerIdx==null&&!isEtIncomplet){showToast('Sélectionne le gagnant');return}
  if(!isEtIncomplet){
    for(const i of active){
      if(i===winnerIdx)continue;
      const e=d.perPlayer[i]||{};
      if(e.parole||e.p51noFollow||e.p51badLay)continue;
      if(e.malus==null||isNaN(e.malus)){showToast(`Saisis les points de ${state.players[i].name}`);return}
    }
  }
  const entries=active.map(i=>{
    const e=d.perPlayer[i]||{};
    let delta=0;
    if(isEtIncomplet){
      delta=i===badLayIdx?51:0;
    }else if(!e.parole&&i!==winnerIdx){
      if(e.p51noFollow||e.p51badLay){
        delta=(e.p51noFollow?51:0)+(e.p51badLay?51:0);
      }else{
        delta=e.malus||0;
      }
    }
    return{idx:i,isWinner:!isEtIncomplet&&i===winnerIdx,parole:!!e.parole,malus:isEtIncomplet&&i!==badLayIdx?0:(e.malus||0),p51noFollow:!!e.p51noFollow,p51badLay:!!e.p51badLay,etale:!!e.etale,delta};
  });
  entries.forEach(e=>{
    state.players[e.idx].score+=e.delta;
    if(state.players[e.idx].score>=ELIMINATION)state.players[e.idx].eliminated=true;
  });
  const badLayTriggered=entries.some(e=>e.p51badLay);
  const noFollowTriggered=entries.some(e=>e.p51noFollow);
  const newlyOut=entries.filter(e=>{const p=state.players[e.idx];return p.eliminated&&p.score-e.delta<ELIMINATION});
  if(badLayTriggered)playBadLaySound();
  else if(noFollowTriggered)playNoFollowSound();
  else if(newlyOut.length)playEliminationSound();
  state.rounds.push({parole:false,dealerIdx:state.dealerIdx,jokerRank:d.jokerRank,jokerSuit:d.jokerSuit,started:d.started,entries});
  state.dealerIdx=nextActiveAfter(state.dealerIdx);
  // Game ends when 2+ players are eliminated (remaining players are winners)
  if(state.players.filter(p=>p.eliminated).length>=2){
    if(state.playForCoffee){
      const ws=state.players.map((p,i)=>i).filter(i=>!state.players[i].eliminated);
      const ls=state.players.map((p,i)=>i).filter(i=>state.players[i].eliminated);
      state.coffeeDebts=[];
      ls.forEach(l=>ws.forEach(w=>state.coffeeDebts.push({from:l,to:w,settled:false})));
    }
    state.screen='finished';state.draft=emptyDraft();render();
    if(newlyOut.length)showToast(`${state.players[newlyOut[0].idx].name} éliminé !`);
    saveGame();return;
  }
  state.draft=emptyDraft();
  state.screen='pickJoker';
  render();
  if(!badLayTriggered&&!noFollowTriggered&&!newlyOut.length)playRandomSnippet();
  const toastMsg=newlyOut.length?`${state.players[newlyOut[0].idx].name} éliminé !`:isEtIncomplet?`Étalage incomplet — ${state.players[badLayIdx].name} +51`:winnerIdx!=null?`Tour gagné par ${state.players[winnerIdx].name}`:'Tour validé';
  showToast(toastMsg);
}

render();
initSession();
</script>
